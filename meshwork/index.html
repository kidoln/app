<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="MeshWork brings local Markdown, AI discussion, and Git sharing into one Apple-native knowledge workspace."
    />
    <title>MeshWork</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="apple-touch-icon" href="images/favicon.png" />
    <link rel="preload" as="image" href="images/poster_zh.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="MeshWork">
        <img src="images/favicon.png" alt="" />
        <span>MeshWork</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="../" data-i18n="nav.studio"></a>
        <a href="#features" data-i18n="nav.features"></a>
        <a href="#workflow" data-i18n="nav.workflow"></a>
        <a href="#ai" data-i18n="nav.ai"></a>
        <a href="#sharing" data-i18n="nav.sharing"></a>
        <a href="manual.html" data-i18n="nav.manual"></a>
      </nav>
      <div class="language-switch" aria-label="Language switch">
        <button type="button" class="lang-button is-active" data-lang="zh">
          中文
        </button>
        <button type="button" class="lang-button" data-lang="en">EN</button>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-copy" data-reveal>
          <p class="eyebrow" data-i18n="hero.eyebrow"></p>
          <h1 data-i18n="hero.title"></h1>
          <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
          <div class="hero-actions">
            <a class="primary-action" href="manual.html" data-i18n="hero.primary"></a>
            <a class="secondary-action" href="#workflow" data-i18n="hero.secondary"></a>
          </div>
          <div class="hero-points" aria-label="Product highlights">
            <span data-i18n="hero.pointOne"></span>
            <span data-i18n="hero.pointTwo"></span>
            <span data-i18n="hero.pointThree"></span>
          </div>
        </div>
        <figure class="hero-shot" data-reveal>
          <picture>
            <source
              srcset="images/poster_zh.png"
              data-src-zh="images/poster_zh.png"
              data-src-en="images/poster_en.png"
            />
            <img
              src="images/poster_zh.png"
              alt=""
              data-image-key="heroPoster"
            />
          </picture>
        </figure>
      </section>

      <section class="intro section-wrap" data-reveal>
        <p class="section-kicker" data-i18n="intro.kicker"></p>
        <div class="split-heading">
          <h2 data-i18n="intro.title"></h2>
          <p data-i18n="intro.body"></p>
        </div>
      </section>

      <section
        id="features"
        class="features section-wrap"
        aria-labelledby="features-title"
      >
        <div class="section-heading" data-reveal>
          <p class="section-kicker" data-i18n="features.kicker"></p>
          <h2 id="features-title" data-i18n="features.title"></h2>
          <p data-i18n="features.body"></p>
        </div>

        <div class="feature-grid">
          <article class="feature-card feature-card-large" data-reveal>
            <span class="feature-icon">⌘</span>
            <h3 data-i18n="features.native.title"></h3>
            <p data-i18n="features.native.body"></p>
            <ul>
              <li data-i18n="features.native.pointOne"></li>
              <li data-i18n="features.native.pointTwo"></li>
              <li data-i18n="features.native.pointThree"></li>
            </ul>
          </article>
          <article class="feature-card" data-reveal>
            <span class="feature-icon">MD</span>
            <h3 data-i18n="features.files.title"></h3>
            <p data-i18n="features.files.body"></p>
          </article>
          <article class="feature-card" data-reveal>
            <span class="feature-icon">¶</span>
            <h3 data-i18n="features.editor.title"></h3>
            <p data-i18n="features.editor.body"></p>
          </article>
          <article class="feature-card" data-reveal>
            <span class="feature-icon">↔</span>
            <h3 data-i18n="features.links.title"></h3>
            <p data-i18n="features.links.body"></p>
          </article>
          <article class="feature-card" data-reveal>
            <span class="feature-icon">⌕</span>
            <h3 data-i18n="features.search.title"></h3>
            <p data-i18n="features.search.body"></p>
          </article>
        </div>
      </section>

      <section
        id="workflow"
        class="workflow section-wrap"
        aria-labelledby="workflow-title"
      >
        <div class="section-heading compact" data-reveal>
          <p class="section-kicker" data-i18n="workflow.kicker"></p>
          <h2 id="workflow-title" data-i18n="workflow.title"></h2>
          <p data-i18n="workflow.body"></p>
        </div>
        <div class="workflow-steps" data-reveal>
          <article>
            <span>1</span>
            <h3 data-i18n="workflow.private.title"></h3>
            <p data-i18n="workflow.private.body"></p>
          </article>
          <article>
            <span>2</span>
            <h3 data-i18n="workflow.discuss.title"></h3>
            <p data-i18n="workflow.discuss.body"></p>
          </article>
          <article>
            <span>3</span>
            <h3 data-i18n="workflow.write.title"></h3>
            <p data-i18n="workflow.write.body"></p>
          </article>
          <article>
            <span>4</span>
            <h3 data-i18n="workflow.share.title"></h3>
            <p data-i18n="workflow.share.body"></p>
          </article>
        </div>
      </section>

      <section id="ai" class="showcase section-wrap" aria-labelledby="ai-title">
        <div class="showcase-copy" data-reveal>
          <p class="section-kicker" data-i18n="ai.kicker"></p>
          <h2 id="ai-title" data-i18n="ai.title"></h2>
          <p data-i18n="ai.body"></p>
          <div class="tool-list" aria-label="AI tools">
            <span data-i18n="ai.toolOne"></span>
            <span data-i18n="ai.toolTwo"></span>
            <span data-i18n="ai.toolThree"></span>
            <span data-i18n="ai.toolFour"></span>
          </div>
        </div>
        <figure class="showcase-image" data-reveal>
          <picture>
            <source
              srcset="images/poster_2_zh.png"
              data-src-zh="images/poster_2_zh.png"
              data-src-en="images/poster_2_en.png"
            />
            <img
              src="images/poster_2_zh.png"
              alt=""
              data-image-key="knowledgePoster"
            />
          </picture>
        </figure>
      </section>

      <section
        id="sharing"
        class="showcase showcase-reverse section-wrap"
        aria-labelledby="sharing-title"
      >
        <div class="showcase-copy" data-reveal>
          <p class="section-kicker" data-i18n="sharing.kicker"></p>
          <h2 id="sharing-title" data-i18n="sharing.title"></h2>
          <p data-i18n="sharing.body"></p>
          <div class="boundary-list">
            <span data-i18n="sharing.boundaryOne"></span>
            <span data-i18n="sharing.boundaryTwo"></span>
            <span data-i18n="sharing.boundaryThree"></span>
          </div>
        </div>
        <figure class="showcase-image" data-reveal>
          <picture>
            <source
              srcset="images/poster_3_zh.png"
              data-src-zh="images/poster_3_zh.png"
              data-src-en="images/poster_3_en.png"
            />
            <img
              src="images/poster_3_zh.png"
              alt=""
              data-image-key="sharingPoster"
            />
          </picture>
        </figure>
      </section>

      <section class="documents section-wrap" aria-labelledby="documents-title">
        <div class="section-heading compact" data-reveal>
          <p class="section-kicker" data-i18n="documents.kicker"></p>
          <h2 id="documents-title" data-i18n="documents.title"></h2>
          <p data-i18n="documents.body"></p>
        </div>
        <div class="document-grid" data-reveal>
          <article>
            <strong data-i18n="documents.markdown.title"></strong>
            <span data-i18n="documents.markdown.body"></span>
          </article>
          <article>
            <strong data-i18n="documents.diagram.title"></strong>
            <span data-i18n="documents.diagram.body"></span>
          </article>
          <article>
            <strong data-i18n="documents.office.title"></strong>
            <span data-i18n="documents.office.body"></span>
          </article>
          <article>
            <strong data-i18n="documents.proxy.title"></strong>
            <span data-i18n="documents.proxy.body"></span>
          </article>
        </div>
      </section>

      <section class="story section-wrap" aria-labelledby="story-title">
        <div class="section-heading compact" data-reveal>
          <p class="section-kicker" data-i18n="story.kicker"></p>
          <h2 id="story-title" data-i18n="story.title"></h2>
          <p data-i18n="story.body"></p>
        </div>
        <div class="story-grid" data-reveal>
          <figure>
            <img src="images/real_scene.png" alt="" />
            <figcaption data-i18n="story.sceneOne"></figcaption>
          </figure>
          <figure>
            <img src="images/real_scene_2.png" alt="" />
            <figcaption data-i18n="story.sceneTwo"></figcaption>
          </figure>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>MeshWork</span>
      <span data-i18n="footer.note"></span>
      <a href="privacy.html" data-i18n="footer.privacy"></a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
